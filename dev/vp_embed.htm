<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="vip.css" type="text/css"/>
<script src="vip_analytics.js" type='text/javascript'></script>
<script src="vip_lib.js" type='text/javascript'></script>
<style>
body {
	font-family: Arial;
	margin: 0;
}
#grid {
	width: 100vw;
	height: 100vh;
	min-width: 600px;
	min-height: 400px;
}
</style>
</head>
<body>
<div id="grid"></div>
</body>
<script>

	var vg = new VipGrid("grid");
	var cal_id_list = [];

	var options = decodeURIComponent(window.location.search.substr(1)).split(';');
	for (var i=0; i < options.length; i++)
	{
		var opt = options[i].split('=');

		if (opt[0] == "src")
			cal_id_list.push(opt[1]);

		if (opt[0] == "cfg")
		{
			var keyval = opt[1].split(':');
			var val = keyval[1].replace(/'/g, '"');
			var property = JSON.parse('{\"value\":' + val + '}');
			vg.cfg[keyval[0]] = property.value;
		}
	}

	//var gCal = new AuthCal();
	//gCal.onError = onCalError;
	//vg.registerEventSource(gCal);

	console.log(vg.cfg);
	console.log(cal_id_list);
	vg.init();

</script>
</html>
