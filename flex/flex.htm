<!DOCTYPE html>
<html>
<head>
<title>flex</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
	font-family: Arial;
	height: 100vh;
	margin: 0;
	min-width: 600px;
	min-height: 400px;
}
#grid {
	display: flex;
	height: 100%;
}
table {
	height: 100%;
	width: 100%;
	border-spacing: 1px;
	table-layout: fixed;
}
td {
	background-color: gold;
}
.cell {
	display: flex;
	align-items: center;
}
.cell .num {
	font-size: 0.75em;
	margin: 0.5em;
	padding: 0.5em;
	width: 2em;
	flex-shrink: 0;
	text-align: center;
}
.cell .num.today {
	font-weight: bold;
	color: white;
	background-color: red;
}
.evts {
	display: flex;
	align-items: center;
	overflow: hidden;
}
.evt {
	background-color: coral;
	border-radius: 0.5em;
	overflow: hidden;
	white-space: nowrap;
	text-overflow: ellipsis;
}
</style>
<head>
<body>

<div id="grid">
	<table>
		<tr>
			<td></td>
			<td>
				<div class="cell">
					<div class="num"><span>1</span></div>
				</div>
			</td>
			<td></td>
		</tr>
		<tr>
			<td></td>
			<td>
				<div class="cell">
					<div class="num today">22</div>
					<div class="evts">
						<div class="evt">event one</div>
						<div class="evt">event two</div>
						<div class="evt">event three</div>
						<div class="evt">event four</div>
						<div class="evt">event five</div>
						<div class="evt">event -----------------------------------------------------------------------------------------></div>
					</div>
				</div>
			</td>
			<td></td>
		</tr>
		<tr><td></td><td></td><td></td></tr>
	</table>
</div>

</body>
</html>
