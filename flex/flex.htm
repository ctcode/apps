<!DOCTYPE html>
<html>
<head>
<title>flex</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
	font-family: Arial;
	height: 100vh;
	margin: 0;
	min-width: 600px;
	min-height: 400px;
}
#grid {
	display: flex;
	height: 100%;
}
table {
	height: 100%;
	width: 100%;
	border-spacing: 1px;
	table-layout: fixed;
}
td {
	background-color: gold;
}
.cell {
	display: flex;
}
.cell .num {
	font-size: 0.75em;
	padding: 0.2em;
	display: flex;
	align-items: center;
	justify-content: center;
	min-width: 2em;
}
.cell .num .today {
	font-weight: bold;
	color: white;
	background-color: red;
	padding: 0.2em;
}
</style>
<head>
<body>

<div id="grid">
	<table>
		<tr>
			<td></td>
			<td>
				<div class="cell">
					<div class="num"><span>1</span></div>
				</div>
			</td>
			<td></td>
		</tr>
		<tr>
			<td></td>
			<td>
				<div class="cell">
					<div class="num"><span class="today">22</span></div>
					<div class="evts"><div class="evt">event one</div><div class="evt">event two</div><div class="evt">event three</div></div>
				</div>
			</td>
			<td></td>
		</tr>
		<tr><td></td><td></td><td></td></tr>
	</table>
</div>

</body>
</html>
