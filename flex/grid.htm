<!DOCTYPE html>
<html>
<head>
<title>grid</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
	font-family: Arial;
}
#gridbox {
	width: 80vw;
	height: 80vh;
	min-width: 600px;
	min-height: 400px;
	background-color: grey;
}
#grid {
	display: grid;
	grid-gap: 5px;
	grid-auto-flow: column;
	grid-template-columns: repeat(4, 1fr);
	grid-template-columns: repeat(6, 1fr);
	grid-template-rows: repeat(4, auto);
}
.hdr {
	text-align: center;
	background-color: yellow;
	font-weight: bold;
	padding: 0.2em;
}
.cell {
	padding: 0.2em;
	background-color: gold;
}
.cell .num {
	font-size: 0.75em;
	margin: 0.5em;
	padding: 0.5em;
	width: 2em;
	flex-shrink: 0;
	text-align: center;
}
.cell .num.today {
	font-weight: bold;
	color: white;
	background-color: red;
}
.evts {
	display: flex;
	align-items: center;
	overflow: hidden;
}
.evt {
	background-color: coral;
	border-radius: 0.5em;
	overflow: hidden;
	white-space: nowrap;
	text-overflow: ellipsis;
}
</style>
<head>
<body>

<div id="gridbox">
	<div id="grid">
		<div class="hdr">col 1</div>
		<div class="cell">cell 1.1</div>
		<div class="cell">cell 1.2</div>
		<div class="cell">cell 1.3</div>

		<div class="hdr">col 2</div>
		<div class="cell">cell 2.1</div>
		<div class="cell">cell 2.2 qwertyuiop asdfghjkl zxcvbnm</div>
		<div class="cell">cell 2.3</div>

		<div class="hdr">col 3</div>
		<div class="cell">cell 3.1</div>
		<div class="cell">cell 3.2</div>
		<div class="cell">cell 3.3</div>

		<div class="hdr">col 4</div>
		<div class="cell"><div>4.1a</div><div>4.1b</div><div>4.1c</div></div>
		<div class="cell">cell 4.2</div>
		<div class="cell">cell 4.3</div>

		<div class="hdr">col 5</div>
		<div class="cell">cell 5.1</div>
		<div class="cell">cell 5.2</div>
		<div class="cell">cell 5.3</div>

		<div class="hdr">col 6</div>
		<div class="cell">cell 6.1</div>
		<div class="cell">cell 6.2</div>
		<div class="cell">cell 6.3</div>
	</div>
</div>

</body>
</html>
