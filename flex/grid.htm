<!DOCTYPE html>
<html>
<head>
<title>grid</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
	font-family: Arial;
	margin: 0;
}
#gridbox {
	background-color: grey;
	height: 100vh;
}
#grid {
	display: grid;
	position: relative;
	height: 100%;
	grid-gap: 1px;
}
#grid.column {
	grid-auto-flow: column;
	grid-auto-columns: 1fr;
	grid-template-rows: 2fr repeat(16, 1fr) 1em;
}
#grid.list {
	grid-auto-flow: row;
	grid-template-rows: repeat(6, 1fr);
	grid-template-columns: 3fr repeat(16, 1fr) 1em;
}
.hdr {
	text-align: center;
	background-color: yellow;
	font-weight: bold;
	padding: 0.2em;
}
.column .hdr {
	grid-row: 1;
}
.list .hdr {
	grid-column: 1;
}
.ftr {
	grid-row: 18;
	background-color: blue;
}

.cell {
	padding: 0.2em;
	background-color: gold;
}
.compact .cell {
	overflow: hidden;
	white-space: nowrap;
	text-overflow: ellipsis;
}
.column .cell.offset0 {grid-row-start: 2;}
.column .cell.offset1 {grid-row-start: 3;}
.column .cell.offset2 {grid-row-start: 4;}
.column .cell.offset3 {grid-row-start: 5;}
.column .cell.offset4 {grid-row-start: 6;}
.column .cell.offset5 {grid-row-start: 7;}
.list .cell.offset0 {grid-column-start: 2;}
.list .cell.offset1 {grid-column-start: 3;}
.list .cell.offset2 {grid-column-start: 4;}
.list .cell.offset3 {grid-column-start: 5;}
.list .cell.offset4 {grid-column-start: 6;}
.list .cell.offset5 {grid-column-start: 7;}

.labels {
	background-color: gainsboro;
}
.label {
	height: 100%;
	padding: 0.25em 0.1em;
	box-sizing: border-box;
	position: absolute;
	border-radius: 0.5em;
	overflow: hidden;
	white-space: nowrap;
	text-overflow: ellipsis;
	writing-mode: vertical-rl;
}
@media only screen and (orientation: portrait) {
	.cell {
		background-color: red;
	}
}
</style>
<head>
<body>

<div id="gridbox">
	<div id="grid" class="column">
		<div class="hdr">col 1</div>
		<div class="cell offset3">1</div>
		<div class="cell">2</div>
		<div class="cell">3</div>
		<div class="cell">4</div>
		<div class="cell">5</div>
		<div class="cell">6</div>
		<div class="cell">7</div>
		<div class="cell">8</div>
		<div class="cell">9</div>
		<div class="ftr"></div>

		<div class="hdr">col 2</div>
		<div class="cell offset2">1</div>
		<div class="cell">2</div>
		<div class="cell">3</div>
		<div class="cell">4</div>
		<div class="cell">
			<div class="labels" style="margin-left: 7em;">
				<div>e1</div>
				<div>e2</div>
				<div>e3</div>
				<div>e4</div>
				<div>e5</div>
			</div>
		</div>
		<div class="cell">6</div>
		<div class="cell">7</div>
		<div class="cell">8</div>
		<div class="cell">9</div>
		<div class="cell">10</div>
		<div class="cell">11</div>
		<div class="ftr"></div>
		<div class="label" style="grid-column: 3; grid-row: 8 / span 3; background-color: coral; margin-left: 3em;">event 1</div>
		<div class="label" style="grid-column: 2; grid-row: 7 / span 4; background-color: lightcoral; margin-left: 1em;">event 2 qwertyuiop asdfghjkl</div>

		<div class="hdr">col 3</div>
		<div class="cell offset4">1</div>
		<div class="cell">2</div>
		<div class="cell">3</div>
		<div class="cell">4</div>
		<div class="cell">5</div>
		<div class="cell">6</div>
		<div class="ftr"></div>

		<div class="hdr">col 4</div>
		<div class="cell offset5">1</div>
		<div class="cell">2</div>
		<div class="cell">3</div>
		<div class="cell">4</div>
		<div class="cell">5</div>
		<div class="cell">6</div>
		<div class="cell">7</div>
		<div class="cell">8</div>
		<div class="cell">9</div>
		<div class="cell">10</div>
		<div class="ftr"></div>

		<div class="hdr">col 5</div>
		<div class="cell offset0">1</div>
		<div class="cell">2</div>
		<div class="cell">3</div>
		<div class="cell">4</div>
		<div class="cell">5</div>
		<div class="cell">6</div>
		<div class="cell">7</div>
		<div class="cell">8</div>
		<div class="cell">9</div>
		<div class="cell">10</div>
		<div class="ftr"></div>

		<div class="hdr">col 6</div>
		<div class="cell offset2">1</div>
		<div class="cell">2</div>
		<div class="cell">3</div>
		<div class="cell">4</div>
		<div class="cell">5</div>
		<div class="cell">6</div>
		<div class="cell">7</div>
		<div class="ftr"></div>
	</div>
</div>

</body>
</html>
