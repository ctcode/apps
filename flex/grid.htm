<!DOCTYPE html>
<html>
<head>
<title>grid</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
	font-family: Arial;
	margin: 0;
	height: 100vh;
}
#gridbox {
	background-color: grey;
	height: 100%;
}
#grid {
	display: grid;
	height: 100%;
	grid-gap: 5px;
}
#grid.column {
	grid-auto-flow: column;
	grid-template-columns: repeat(6, 1fr);
	grid-template-rows: 2fr repeat(10, 1fr);
}
#grid.list {
	grid-auto-flow: row;
	grid-template-rows: repeat(6, 1fr);
	grid-template-columns: 3fr repeat(10, 1fr);
}
.hdr {
	text-align: center;
	background-color: yellow;
	font-weight: bold;
	padding: 0.2em;
}
.cell {
	padding: 0.2em;
	background-color: gold;
}
.compact .cell {
	overflow: hidden;
	white-space: nowrap;
	text-overflow: ellipsis;
}
.cell .num {
	font-size: 0.75em;
	margin: 0.5em;
	padding: 0.5em;
	width: 2em;
	flex-shrink: 0;
	text-align: center;
}
.cell .num.today {
	font-weight: bold;
	color: white;
	background-color: red;
}
.evts {
	display: flex;
	align-items: center;
	overflow: hidden;
}
.evt {
	background-color: coral;
	border-radius: 0.5em;
	overflow: hidden;
	white-space: nowrap;
	text-overflow: ellipsis;
}
</style>
<head>
<body>

<div id="gridbox">
	<div id="grid" class="column compact">
		<div class="hdr">col 1</div>
		<div class="cell">1</div>
		<div class="cell">2</div>
		<div class="cell">3</div>
		<div class="cell">4</div>
		<div class="cell">5</div>
		<div class="cell">6</div>
		<div class="cell">7</div>
		<div class="cell">8</div>
		<div class="cell">9</div>
		<div class="cell">10</div>

		<div class="hdr">col 2</div>
		<div class="cell">1</div>
		<div class="cell">2</div>
		<div class="cell">3</div>
		<div class="cell">4</div>
		<div class="cell">5</div>
		<div class="cell">6</div>
		<div class="cell">7</div>
		<div class="cell">8</div>
		<div class="cell">9</div>
		<div class="cell">10</div>

		<div class="hdr">col 3</div>
		<div class="cell">1</div>
		<div class="cell">2 qwertyuip asdfghjkl zxcvbnmm QWERTYUIOP ASDFGHJKL ZXCVBNNM 1234567890</div>
		<div class="cell">3</div>
		<div class="cell">4</div>
		<div class="cell">5</div>
		<div class="cell">6</div>
		<div class="cell">7</div>
		<div class="cell">8</div>
		<div class="cell">9</div>
		<div class="cell">10</div>

		<div class="hdr">col 4</div>
		<div class="cell">1</div>
		<div class="cell">2</div>
		<div class="cell">3</div>
		<div class="cell">4</div>
		<div class="cell">5</div>
		<div class="cell">6</div>
		<div class="cell">7</div>
		<div class="cell">8</div>
		<div class="cell">9</div>
		<div class="cell">10</div>

		<div class="hdr">col 5</div>
		<div class="cell">1</div>

	</div>
</div>

</body>
</html>
