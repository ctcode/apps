<!DOCTYPE html>
<html>
<head>
<title>scroll test</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
	margin: 0;
	min-width: 600px;
	min-height: 400px;
}
#header {
	height: 3em;
	background-color: gainsboro;
}
#main {
	height: calc(100vh - 6em);
}
#footer {
	height: 3em;
	background-color: gainsboro;
}
#box {
	overflow: auto;
	background-color: blue;
	height: 100%;
}
#grid {
	width: 200%;
	height: 100%;
	font-size: 30pt;
	display: grid;
	grid-gap: 1px;
	grid-auto-flow: column;
	grid-auto-columns: 1fr;
	grid-template-rows: 3em repeat(10, 1fr) 1em;
}
.month {
	display: contents;
}
.hdr {
	grid-row: 1;
	background-color: green;
}
.day {
	background-color: red;
}
.ftr {
	grid-row: 12;
	background-color: gold;
}
</style>
<head>
<body>

<div id="header">
	header
</div>

<div id="main">
	<div id="box">
		<div id="grid">
			<div class="month">
				<div class="hdr">m1</div>
				<div class="day">d1</div>
				<div class="day">d2</div>
				<div class="day"><div>d3a</div><div>d3b</div><div>d3c</div></div>
				<div class="day">d4</div>
				<div class="day">d5</div>
				<div class="day">d6</div>
				<div class="day">d7</div>
				<div class="day">d8</div>
				<div class="ftr"></div>
			</div>
			<div class="month">
				<div class="hdr">m2</div>
				<div class="day">d1</div>
				<div class="day">d2</div>
				<div class="day">d3</div>
				<div class="day">d4</div>
				<div class="day">d5</div>
				<div class="day">d6</div>
				<div class="ftr"></div>
			</div>
			<div class="month">
				<div class="hdr">m3</div>
				<div class="day">d1</div>
				<div class="day">d2</div>
				<div class="day">d3</div>
				<div class="day">d4</div>
				<div class="day">d5</div>
				<div class="day">d6</div>
				<div class="day">d7</div>
				<div class="ftr"></div>
			</div>
		</div>
	</div>
</div>

<div id="footer">
	footer
</div>

</body>
</html>
