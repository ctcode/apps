<style>
.vptable {
	height: 100%;
	width: 100%;
	border-spacing: 1px;
	table-layout: fixed;
	pointer-events: none;
	user-select: none;
	--fontscale: {{vptable.fontscale}};
}
.vpcell.weekday {
	background-color: #eaeaea;
}
.vpcell.weekend {
	background-color: #d8d8d8;
}
.vpcell.past {
	opacity: {{vptable.past_opacity}};
}
.vphdr {
	text-align: center;
	font-weight: bold;
	padding: 1em;
	overflow: hidden;
	white-space: nowrap;
}
.vpday {
	display: flex;
}
.vpnum {
	font-size: 0.8em;
	width: 2em;
	padding: 0.2em;
	display: flex;
	align-items: center;
	justify-content: center;
}
.vpnum .today {
	font-weight: bold;
	color: white;
	background-color: red;
	padding: 0.25em;
}
.vplink {
	pointer-events: all;
	cursor: pointer;
}
.vpevents {
	display: flex;
	align-items: center;
}
.vpevent {
	display: flex;
	margin-left: 0.5em;
	pointer-events: all;
}
.vpevent.checked {
	display: none;
}
.vpeventmarker {
	margin-right: 0.3em;
	padding: 0em 0.5em;
}
#vpscrollbox {
	display: flex;
	height: 100%;
	position: relative;
	overflow: auto;
	border: none;
	outline: none;
}
#vpscrollcontent {
	position: absolute;
	pointer-events: none;
	height: 100%;
}
@media only print {
	#vpscrollbox {overflow: visible;}
}
</style>

<style ng-if="vptable.view.sel.column">
.vptable {
	font-size: calc(1.1vh * var(--fontscale));
}
#vpscrollcontent {
	width: {{vptable.scroll_size}}%;
}
</style>

<style ng-if="vptable.view.sel.list">
.vptable {
	font-size: calc(1.4vh * var(--fontscale));
}
.vphdr {
	width: 10em;
}
.vpday {
	position: relative;
	vertical-align: top;
	text-align: center;
	z-index: 0;
}
.vpnum {
	width: auto;
}
#vpscrollcontent {
	height: {{vptable.scroll_size}}%;
}
</style>

<style ng-if="vptable.view.sel.expand">
.vptable {
	font-size: 1em;
}
#vpscrollcontent {
	width: {{vptable.scroll_size}}%;
}
</style>

<div id="vpscrollbox">
	<div id="vpscrollcontent">
		<table class="vptable">
			<tr ng-repeat="row in vptable.rows">
				<td ng-repeat="cell in row.cells" class="vpcell" ng-class="cell.cls">
					<div ng-if="cell.month" class="vphdr vplink" ng-click="vptable.onclickHdr(cell.month)">{{cell.month.hdr}}</div>
					<div ng-if="cell.day" class="vpday">
						<div class="vpnum vplink" ng-click="vptable.onclickDayNum(cell.day)"><span ng-class="cell.cls">{{cell.day.num}}</span></div>
						<div class="vpevents" ng-if="cell.day.evts">
							<div class="vpevent" ng-repeat="evt in cell.day.evts" ng-class="evt.cal.cls" ng-click="evt.edit()">
								<span class="vpeventmarker" ng-style="{'background-color': evt.cal.colour}"></span>
								<div>{{evt.title}}</div>
							</div>
						</div>
					</div>
					<div ng-if="cell.empty">&nbsp;</div>
				</td>
			</tr>
		</table>
	</div>
</div>
