<style>
#vpcalbox {
	display: flex;
	align-items: center;
	justify-content: center;
	overflow: hidden;
	font-size: 0.65em;
	height: 100%;
	user-select: none;
	-ms-user-select: none;
	-webkit-user-select: none;
}
.vpcalbtn {
	margin: 0.3em 0;
	padding: 0.5em;
	overflow: hidden;
	white-space: nowrap;
	text-overflow: ellipsis;
}
.vpcalbtn:hover {
	background-color: rgba(0,0,0,0.1);
}
.vpcalbtn:active {
	background-color: rgba(0,0,0,0.3);
}
.vpcalbtn.checked {
	opacity: 0.5;
}
.vpcalmarker {
	margin-right: 0.3em;
	padding: 0em 0.5em;
	border-radius: 0.25em;
}
</style>

<div id="vpcalbox">
	<div class="vpcalbtn" ng-repeat="cal in vpevents.calendars | orderBy: 'name'" ng-class="cal.cls" ng-click="cal.toggle()">
		<span class="vpcalmarker" style="background-color: {{cal.colour.background}}"></span>
		<span>{{cal.name}}</span>
	</div>
</div>
