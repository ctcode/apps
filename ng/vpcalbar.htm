<style>
#vpcalbox {
	background-color: gainsboro;
	display: flex;
	justify-content: center;
	overflow: hidden;
	font-size: 0.65em;
	min-height: 1em;
	user-select: none;
	-ms-user-select: none;
	-webkit-user-select: none;
}
.vpcalbtn {
	margin: 0.3em 0;
	padding: 0.5em;
	overflow: hidden;
	white-space: nowrap;
	text-overflow: ellipsis;
}
.vpcalbtn:hover {
	background-color: rgba(0,0,0,0.1);
}
.vpcalbtn:active {
	background-color: rgba(0,0,0,0.3);
}
.vpcalbtn.checked {
	opacity: 0.5;
}
.vpcalmarker {
	margin-right: 0.3em;
	padding: 0em 0.5em;
	border-radius: 0.25em;
}
#navbar {
	background-color: gainsboro;
	font-size: 0.6em;
	font-weight: bold;
	padding-bottom: 0.5em;
	display: flex;
	align-items: center;
	justify-content: space-around;
	user-select: none;
	-ms-user-select: none;
	-webkit-user-select: none;
}
</style>

<div id="vpcalbox">
	<div class="vpcalbtn" ng-repeat="cal in vpevents.calendars | orderBy: 'name'" ng-class="cal.cls" ng-click="cal.toggle()">
		<span class="vpcalmarker" style="background-color: {{cal.colour.background}}"></span>
		<span>{{cal.name}}</span>
	</div>
</div>
<div id="navbar" title="Go Here">
	<div>&#9475</div><div>&#9679</div><div>2019</div><div>&#9679</div><div>&#9475</div><div>&#9679</div><div>2020</div><div>&#9679</div><div>&#9475</div><div>&#9679</div><div>2021</div><div>&#9679</div><div>&#9475</div>
</div>
