<!DOCTYPE html>
<html>
<head>
<title>ostrkmap</title>
<link rel="icon" href="satos.png">
<link rel="manifest" href="manifest.json">
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.4/angular.min.js"></script>
<script type="text/javascript" src="https://openspace.ordnancesurvey.co.uk/osmapapi/openspace.js?key=2F6DEC09B8A25C07E0530B6CA40AD1A2"></script>
<script type="text/javascript" src="ostrkmap.js"></script>

<style>
body {
	font-family: 'Consolas';
	margin: 0;
	display: flex;
	flex-direction: row;
}
#infobox {
	flex-grow: 1;
	height: 100vh;
	width: 33vw;
	box-sizing: border-box;
	padding: 2em;
	font-size: 1.8vh;
	line-height: 2em;
	background-color: #aaaaaa;
}
#map {
	flex-grow: 4;
	height: 100vh;
	width: 67vw;
	background-color: rgba(0,0,0,0.2);
}
</style>
</head>

<body ng-app="ostrkmap" ng-controller="main" ng-cloak>
<div id="infobox">
	<div>{{infobox.line1}}</div>
	<div>{{infobox.line2}}</div>
</div>
<div id="map"></div>

<script>
	var app = angular.module("ostrkmap", []);
	app.controller("main", mainCtrl);
</script>
</body>

</html>
