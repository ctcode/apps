<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.7.7/angular.min.js"></script>
<link rel="stylesheet" href="vplib.css" type="text/css"/>
<script src="vplib.js" type='text/javascript'></script>
<style>
body::-webkit-scrollbar {
  width: 0;
  height: 0;
}
.vptable {
	font-size: 1.4vh;
	padding: 2em;
	height: 300vh;
}
.vphdr {
	width: 10em;
}
.vpday {
	position: relative;
	vertical-align: top;
	text-align: center;
	z-index: 0;
}
.vpnum {
	width: auto;
}
</style>
</head>
<body ng-app="vpview" ng-cloak>

<table class="vptable" ng-controller="LayoutController as table">
	<tr ng-repeat="row in table.rows">
		<th class="vphdr">{{row.hdr}}</th>
		<td ng-repeat="cell in row.cells" ng-class="cell.cls">
			<div ng-if="cell.cls.vpday" class="vpnum">{{cell.num}}</div>
		</td>
	</tr>
</table>

<script type='text/javascript'>
var app = angular.module("vpview", []);
app.controller("LayoutController", VpRowLayout);
app.service("VpSettingsSvc", VpSettings);
app.service("VpAlmanacSvc", VpAlmanac);
</script>

</body>
</html>
