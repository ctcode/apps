<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto" type="text/css"/>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.7.7/angular.min.js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<link href="vp.png" rel="icon">
<style>
body {
	font-family: Arial;
	height: 100vh;
	margin: 0;
	min-width: 600px;
	min-height: 400px;
}
</style>
<title>Print</title>
</head>
<body ng-app="vpApp" ng-controller="vpPrintController" ng-cloak>
<div ng-hide="show.grid">{{vpaccount.status.msg}}</div>
<vp-grid disable-autoload disable-scrolling ng-show="show.grid"/>
<script src="vpconfig.js" type='text/javascript'></script>
<script src="vplib.js" type='text/javascript'></script>
<script type='text/javascript'>
angular.module("vpApp").controller("vpPrintController", function($scope, vpAccount, vpSettings) {
	$scope.vpaccount = vpAccount;
	$scope.show = {};

	$scope.$on("account:signin", function() {
		$scope.$apply(function() {
			vpSettings.load();
		});
	});

	$scope.$on("account:signout", function() {
		$scope.$apply(function() {
			$scope.show = {};
		});
	});

	$scope.$on("settings:load", function() {
		$scope.$apply(function() {
			$scope.vpgrid.set(parseInt(window.location.hash.substr(1)));
			$scope.show = {grid: true};
		});
	});

	vpAccount.connect();
});
</script>
</body>
</html>
