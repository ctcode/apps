<style>
#vpbox {
	display: flex;
	height: 100%;
	position: relative;
	overflow: auto;
	border: none;
	outline: none;
}
@media only print {
	#vpbox {overflow: visible;}
}
#vpcontent {
	position: absolute;
	pointer-events: none;
}
#vpgrid {
	height: 100%;
	padding-bottom: 1em;
	box-sizing: border-box;
	display: grid;
	grid-gap: 1px;
	user-select: none;
	--fontscale: {{vpgrid.fontscale}};
}
.vpcell {
	display: flex;
	align-items: center;
}
.vpcell.weekday {
	background-color: #eaeaea;
}
.vpcell.weekend {
	background-color: #d8d8d8;
}
.vpcell.past {
	opacity: {{vpgrid.past_opacity}};
}
.vpmonth {
	justify-content: center;
	font-weight: bold;
	padding: 1em;
	overflow: hidden;
	white-space: nowrap;
}
.vpnum {
	font-size: 0.8em;
	width: 1.5em;
	text-align: center;
	margin: 1px;
	padding: 0.3em;
	flex-shrink: 0;
}
.today .vpnum {
	font-weight: bold;
	color: white;
	background-color: red;
}
.vplink {
	pointer-events: all;
	cursor: pointer;
}
.vpevents {
}
.vpevent {
	border-radius: 0.25em;
	padding: 0.1em 0.2em;
	margin: 0 1px;
	pointer-events: all;
}
.vpevent.checked {
	display: none;
}
</style>

<style ng-if="vpgrid.view.sel.column">
#vpcontent {
	height: 100%;
	width: {{vpgrid.scroll_size}}%;
}
#vpgrid {
	font-size: calc(1.1vh * var(--fontscale));
	grid-auto-flow: column;
	grid-template-rows: 2fr repeat(37, 1fr);
}
.vpevents {
	display: flex;
	align-items: center;
	overflow: hidden;
}
.vpevent {
	overflow: hidden;
	white-space: nowrap;
	text-overflow: ellipsis;
}
</style>

<style ng-if="vpgrid.view.sel.list">
#vpcontent {
	width: 100%;
	height: {{vpgrid.scroll_size}}%;
}
#vpgrid {
	font-size: calc(1.4vh * var(--fontscale));
	grid-auto-flow: row;
	grid-template-columns: 5fr repeat(37, 1fr);
}
.vphdr {
	width: 10em;
}
.vpday {
	position: relative;
	vertical-align: top;
	text-align: center;
	z-index: 0;
}
.vpnum {
	width: auto;
}
</style>

<style ng-if="vpgrid.view.sel.expand">
</style>

<div id="vpbox">
	<div id="vpcontent">
		<div id="vpgrid">
			<div ng-repeat="cell in vpgrid.cells" class="vpcell" ng-class="cell.cls">
				<div ng-if="cell.empty">&nbsp;</div>
				<div ng-if="cell.cls.vpmonth">{{cell.hdr}}</div>
				<div ng-if="cell.cls.vpday">
					<div class="vpnum vplink" ng-click="cell.onclickDayNum()">{{cell.num}}</div>
				</div>
			</div>
		</div>
	</div>
</div>
