<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.7.7/angular.min.js"></script>
<link rel="stylesheet" href="vplib.css" type="text/css"/>
<script src="vplib.js" type='text/javascript'></script>
<style>
body {
	width: 300vw;
}
body::-webkit-scrollbar {
	height: 0;
}
.vptable {
	font-size: 1.2vh;
}
@media only print
{
	body {
		position: relative;
		left: -33.33%;
	}
}
</style>
</head>
<body ng-app="vpview" ng-cloak>

<table class="vptable" ng-controller="LayoutController as table">
	<tr><th ng-repeat="hdr in table.hdrs" class="vphdr">{{hdr}}</th></tr>
	<tr ng-repeat="row in table.rows">
		<td ng-repeat="cell in row.cells" ng-class="cell.cls">
			<div ng-if="cell.empty">&nbsp;</div>
			<div ng-if="cell.cls.vpday" class="vpnum">{{cell.num}}</div>
		</td>
	</tr>
</table>

<script type='text/javascript'>
var app = angular.module("vpview", []);
app.controller("LayoutController", VpColLayout);
app.service("VpSettingsSvc", VpSettings);
app.service("VpAlmanacSvc", VpAlmanac);

myonwheel = function(event)
{
	console.log(event);
	window.scrollBy(event.deltaY, 0);
	event.preventDefault();
}
document.onwheel = myonwheel;

</script>

</body>
</html>
